<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍽️ 문정역 점심 뽑기</title>

<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

h1 { font-size: 1.8rem; margin: 20px 0 5px; text-align: center; }

.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; }

.filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }

.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #444; background: #1e1e1e; color: #ccc; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }

.filter-btn.active { background: #20b2aa; border-color: #20b2aa; color: #fff; }

.spin-btn { width: 200px; height: 200px; border-radius: 50%; background: linear-gradient(135deg, #20b2aa, #1a8c85); border: none; color: #fff; font-size: 1.4rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px rgba(32,178,170,0.4); transition: transform 0.1s, box-shadow 0.2s; margin: 10px 0 24px; }

.spin-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(32,178,170,0.6); }

.spin-btn:active { transform: scale(0.96); }

.spin-btn.spinning { animation: pulse 0.5s infinite alternate; }

@keyframes pulse { from { transform: scale(1); box-shadow: 0 0 30px rgba(32,178,170,0.4); } to { transform: scale(1.08); box-shadow: 0 0 60px rgba(32,178,170,0.8); } }

.result-card { background: #1e1e1e; border: 1px solid #333; border-radius: 16px; padding: 24px 28px; width: 100%; max-width: 420px; text-align: center; display: none; }

.result-card.show { display: block; animation: slideUp 0.4s ease; }

@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.result-emoji { font-size: 3rem; margin-bottom: 8px; }

.result-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 6px; color: #20b2aa; }

.result-meta { color: #999; font-size: 0.88rem; margin-bottom: 4px; }

.result-badge { display: inline-block; background: #2a2a2a; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; color: #aaa; margin-top: 10px; }

.restaurant-list { width: 100%; max-width: 500px; margin-top: 24px; }

.restaurant-list h2 { font-size: 1rem; color: #888; margin-bottom: 12px; text-align: center; }

.rest-item { background: #1a1a1a; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a2a2a; cursor: pointer; transition: border-color 0.2s; }

.rest-item:hover { border-color: #20b2aa; }

.rest-item.excluded { opacity: 0.35; text-decoration: line-through; }

.rest-left .rest-name { font-size: 0.95rem; font-weight: bold; }

.rest-left .rest-cat { font-size: 0.78rem; color: #888; margin-top: 2px; }

.rest-right { text-align: right; }

.rest-dist { font-size: 0.8rem; color: #20b2aa; }

.rest-price { font-size: 0.75rem; color: #666; margin-top: 2px; }

.meal-times { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

.meal-btn { padding: 8px 18px; background: #1e1e1e; border: 1px solid #333; border-radius: 20px; color: #ccc; cursor: pointer; font-size: 0.85rem; }

.meal-btn.active { background: #2d2d2d; border-color: #20b2aa; color: #20b2aa; }

.count-badge { background: #20b2aa22; color: #20b2aa; border-radius: 20px; padding: 3px 10px; font-size: 0.8rem; margin-left: 8px; }




.sikdae-badge { display: inline-block; background: #1a3a3a; border: 1px solid #20b2aa; color: #20b2aa; border-radius: 12px; padding: 2px 8px; font-size: 0.72rem; font-weight: bold; margin-top: 4px; }

.map-links { display: flex; gap: 6px; margin-top: 6px; }

.map-link { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; text-decoration: none; color: #fff; }

.map-link.naver { background: #03c75a; }

.map-link.kakao { background: #ffe000; color: #3a1d1d; }

.map-link:hover { opacity: 0.85; }

.filter-divider { width: 1px; background: #333; height: 24px; align-self: center; }

.filter-btn.sikdae-filter { border-color: #20b2aa; color: #20b2aa; }

.filter-btn.sikdae-filter.active { background: #20b2aa; border-color: #20b2aa; color: #000; font-weight: bold; }

</style>

</head>

<body>

<h1>🍽️ 문정역 점심 뽑기</h1>

<p class="subtitle">문정역 500m 이내 맛집 · 클릭해서 제외/포함</p>




<div class="meal-times">

<button class="meal-btn active" onclick="setMeal('점심')">🌞 점심</button>

<button class="meal-btn" onclick="setMeal('저녁')">🌙 저녁</button>

<button class="meal-btn" onclick="setMeal('아무때나')">🎲 아무때나</button>

</div>




<div class="filters" id="filters"></div>




<button class="spin-btn" id="spinBtn" onclick="spin()">

  🎰<br>뽑기!<br><span id="countBadge" style="font-size:0.7rem; opacity:0.7"></span>

</button>




<div class="result-card" id="resultCard">

<div class="result-emoji" id="resultEmoji">🍜</div>

<div class="result-name" id="resultName"></div>

<div class="result-meta" id="resultMeta"></div>

<div class="result-meta" id="resultPrice"></div>

<div class="result-badge" id="resultDist"></div>

<div id="resultSikdae" class="sikdae-badge" style="display:none; margin-top:10px;">🎫 식권대장 사용 가능</div>

<div id="resultMapLinks" class="map-links" style="display:none; justify-content:center; margin-top:8px;"></div>

</div>




<div class="restaurant-list">

<h2>📋 목록 (클릭하면 제외/포함)</h2>

<div id="listContainer"></div>

</div>




<script>

const restaurants = [{"name": "강촌식당 문정점", "category": "닭갈비", "distance_m": 200, "exit": "3번출구", "price_range": "12,000~15,000원"}, {"name": "우사기소바", "category": "소바/일식", "distance_m": 300, "exit": "3번출구", "price_range": "12,000~16,000원", "sikdae": true, "naverMapUrl": "https://map.naver.com/v5/search/%EC%9A%B0%EC%82%AC%EA%B8%B0%EC%86%8C%EB%B0%94%28%EB%AC%B8%EC%A0%95%29", "kakaoMapUrl": "https://map.kakao.com/link/search/%EC%9A%B0%EC%82%AC%EA%B8%B0%EC%86%8C%EB%B0%94%28%EB%AC%B8%EC%A0%95%29"}, {"name": "흥도식당", "category": "돈카츠", "distance_m": 250, "exit": "3번출구", "price_range": "10,000~14,000원", "sikdae": true, "naverMapUrl": "https://map.naver.com/v5/search/%ED%9D%A5%EB%8F%84%EC%8B%9D%EB%8B%B9", "kakaoMapUrl": "https://map.kakao.com/link/search/%ED%9D%A5%EB%8F%84%EC%8B%9D%EB%8B%B9"}, {"name": "꾼돈 숯불갈비 문정역점", "category": "고기/갈비", "distance_m": 150, "exit": "1번출구", "price_range": "13,000~18,000원"}, {"name": "칠성집 갈매기 문정본점", "category": "고기/갈매기살", "distance_m": 200, "exit": "4번출구", "price_range": "17,000원~"}, {"name": "이가네양꼬치 문정직영점", "category": "양꼬치", "distance_m": 200, "exit": "4번출구", "price_range": "15,000~25,000원"}, {"name": "갯벌의조개 문정역점", "category": "조개/해산물", "distance_m": 300, "exit": "4번출구", "price_range": "15,000~25,000원"}, {"name": "일루 퓨전한식뷔페", "category": "한식뷔페", "distance_m": 400, "exit": "3번출구", "price_range": "13,000~15,000원", "sikdae": true, "naverMapUrl": "https://map.naver.com/v5/search/%EC%9D%BC%EB%A3%A8%ED%95%9C%EC%8B%9D%EB%B7%94%ED%8E%98", "kakaoMapUrl": "https://map.kakao.com/link/search/%EC%9D%BC%EB%A3%A8%ED%95%9C%EC%8B%9D%EB%B7%94%ED%8E%98"}, {"name": "종로계림닭도리탕원조 문정점", "category": "닭볶음탕", "distance_m": 350, "exit": "3번출구", "price_range": "12,000~16,000원"}, {"name": "삼꾸미집 문정점", "category": "삼겹살", "distance_m": 400, "exit": "3번출구", "price_range": "12,000~15,000원"}, {"name": "아빠찜 문정역점", "category": "코다리/생선", "distance_m": 300, "exit": "1번출구", "price_range": "13,000원~"}, {"name": "골목떡볶이", "category": "분식", "distance_m": 450, "exit": "2번출구", "price_range": "4,000~8,000원"}, {"name": "하늘빛우렁쌈밥 문정점", "category": "한식/쌈밥", "distance_m": 400, "exit": "2번출구", "price_range": "10,000~13,000원"}, {"name": "바다생협 대광어 송파본점", "category": "회/해산물", "distance_m": 350, "exit": "4번출구", "price_range": "20,000원~"}, {"name": "툇마루밥상", "category": "한정식", "distance_m": 500, "exit": "3번출구", "price_range": "15,000~20,000원"}];




const categoryEmoji = {

"닭갈비": "🍗", "소바/일식": "🍜", "돈카츠": "🥩", "고기/갈비": "🥩",

"고기/갈매기살": "🥩", "양꼬치": "🍢", "조개/해산물": "🦪", "한식뷔페": "🍱",

"닭볶음탕": "🍲", "삼겹살": "🥓", "코다리/생선": "🐟", "분식": "🌶️",

"한식/쌈밥": "🌿", "회/해산물": "🐠", "한정식": "🍛"

};




let excluded = new Set();

let activeCategories = new Set();

let currentMeal = "점심";

let sikdaeOnly = false;




function toggleSikdaeFilter(btn) {

sikdaeOnly = !sikdaeOnly;

btn.classList.toggle('active', sikdaeOnly);

updateCount(); buildList();

}




function setMeal(meal) {

currentMeal = meal;

document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('active'));

event.target.classList.add('active');

updateCount();

}




function getCategories() {

return [...new Set(restaurants.map(r => r.category))];

}




function buildFilters() {

const cats = getCategories();

const div = document.getElementById('filters');

div.innerHTML = '';

// 식권대장 필터 버튼을 맨 앞에 삽입

const sikdaeBtn = document.createElement('button');

sikdaeBtn.className = 'filter-btn sikdae-filter';

sikdaeBtn.id = 'sikdaeFilterBtn';

sikdaeBtn.textContent = '🎫 식권대장만';

sikdaeBtn.onclick = () => toggleSikdaeFilter(sikdaeBtn);

div.appendChild(sikdaeBtn);

cats.forEach(cat => {

const btn = document.createElement('button');

btn.className = 'filter-btn active';

btn.textContent = (categoryEmoji[cat] || '🍽️') + ' ' + cat;

btn.onclick = () => toggleCategory(cat, btn);

activeCategories.add(cat);

div.appendChild(btn);

  });

}




function toggleCategory(cat, btn) {

if (activeCategories.has(cat)) { activeCategories.delete(cat); btn.classList.remove('active'); }

else { activeCategories.add(cat); btn.classList.add('active'); }

updateCount(); buildList();

}




function getActive() {

return restaurants.filter(r => !excluded.has(r.name) && activeCategories.has(r.category) && (!sikdaeOnly || r.sikdae));

}




function updateCount() {

const n = getActive().length;

document.getElementById('countBadge').textContent = n + '곳 중 선택';

}




function buildList() {

const container = document.getElementById('listContainer');

container.innerHTML = '';

restaurants.forEach(r => {

const div = document.createElement('div');

div.className = 'rest-item' + (excluded.has(r.name) ? ' excluded' : '') + (sikdaeOnly && !r.sikdae ? ' excluded' : '');

const sikdaeBadge = r.sikdae ? '<span class="sikdae-badge">🎫 식권대장</span>' : '';

const mapLinks = r.sikdae ? `<div class="map-links" onclick="event.stopPropagation()">

      <a class="map-link naver" href="${r.naverMapUrl}" target="_blank">N 네이버</a>

      <a class="map-link kakao" href="${r.kakaoMapUrl}" target="_blank">K 카카오</a>

    </div>` : '';

div.innerHTML = `

      <div class="rest-left">

        <div class="rest-name">${categoryEmoji[r.category] || '🍽️'} ${r.name}</div>

        <div class="rest-cat">${r.category} · ${r.exit}</div>

${sikdaeBadge}

${mapLinks}

      </div>

      <div class="rest-right">

        <div class="rest-dist">${r.distance_m}m</div>

        <div class="rest-price">${r.price_range}</div>

      </div>`;

div.onclick = () => { toggleExclude(r.name); };

container.appendChild(div);

  });

}




function toggleExclude(name) {

if (excluded.has(name)) excluded.delete(name);

else excluded.add(name);

buildList(); updateCount();

}




let spinInterval = null;

function spin() {

const active = getActive();

if (active.length === 0) { alert("선택 가능한 음식점이 없어요! 필터를 조정해보세요."); return; }

const btn = document.getElementById('spinBtn');

btn.classList.add('spinning');

let count = 0;

const total = 15 + Math.floor(Math.random() * 10);

spinInterval = setInterval(() => {

const r = active[Math.floor(Math.random() * active.length)];

document.getElementById('resultName').textContent = r.name;

document.getElementById('resultEmoji').textContent = categoryEmoji[r.category] || '🍽️';

document.getElementById('resultCard').classList.add('show');

count++;

if (count >= total) {

clearInterval(spinInterval);

btn.classList.remove('spinning');

const final = active[Math.floor(Math.random() * active.length)];

document.getElementById('resultName').textContent = final.name;

document.getElementById('resultEmoji').textContent = categoryEmoji[final.category] || '🍽️';

document.getElementById('resultMeta').textContent = final.category + ' · ' + final.exit;

document.getElementById('resultPrice').textContent = '💰 ' + final.price_range;

document.getElementById('resultDist').textContent = '📍 문정역에서 약 ' + final.distance_m + 'm';

    }

  }, 80);

}




buildFilters(); buildList(); updateCount();

</script>

</body>

</html>
